        required: false
        default: ""
      manual-trigger-include-nightly-versions:
        type: string
        required: false
        default: ""
      manual-trigger-include-windows-x64:
        type: string
        required: false
        default: ""
      manual-trigger-include-windows-x86:
        type: string
        required: false
        default: ""
      manual-trigger-include-linux-x64:
        type: string
        required: false
        default: ""
      manual-trigger-include-linux-x86:
        type: string
        required: false
        default: ""
      manual-trigger-include-macos-x64:
        type: string
        required: false
        default: ""
      manual-trigger-include-macos-aarch64:
        type: string
        required: false
        default: ""
      manual-trigger-env:
        type: string
        required: false
        default: ""
      manual-trigger-filter:
        type: string
        required: false
        default: ""
      manual-trigger-github_job_prep_script:
        type: string
        required: false
        default: ""
      manual-trigger-testitem-timeout:
        type: string
        required: false
        default: ""
    secrets:
      codecov_token:
        required: true

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  lint:
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.feature == 'LintAndTest') }}
    runs-on: ubuntu-latest
    outputs:
      lint-results: ${{ steps.lint-step.outputs.lint-results }}
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/julia-lint@v1
        id: lint-step

  format:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/install-juliaup@v2
        if: ${{ hashFiles('.JuliaFormatter.toml') != '' }}
        with:
          channel: release
      - name: "JuliaFormatter"
        if: ${{ hashFiles('.JuliaFormatter.toml') != '' }}
        run: |
          import Pkg
          Pkg.add("JuliaFormatter")
        shell: julia --color=yes {0}
      - name: "Run Julia Formatter"
        if: ${{ hashFiles('.JuliaFormatter.toml') != '' }}
        run: |
          import JuliaFormatter
          JuliaFormatter.format(".")'
        shell: julia --color=yes {0}
      - name: Check for formatting errors
        if: ${{ hashFiles('.JuliaFormatter.toml') != '' }}
        shell: bash
        run: |
          output=$(git diff --name-only)
          if [ "$output" != "" ]; then
              >&2 echo "Some files have not been formatted !!!"
              echo "$output"
              exit 1
          fi
      - name: 'Suggest'
        if: ${{ failure() && hashFiles('.JuliaFormatter.toml') != '' }}
        uses: reviewdog/action-suggester@v1
        with:
          tool_name: JuliaFormatter
          fail_on_error: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

  compute-test-matrix:
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.feature == 'LintAndTest') }}
    runs-on: ubuntu-latest
    outputs:
      test-matrix: ${{ steps.compute-test-matrix.outputs.test-matrix }}
      env: ${{ steps.resolve.outputs.env }}
      filter: ${{ steps.resolve.outputs.filter }}
      github_job_prep_script: ${{ steps.resolve.outputs.github_job_prep_script }}
      testitem-timeout: ${{ steps.resolve.outputs.testitem-timeout }}
    steps:
      - id: resolve
        shell: bash
        env:
          INPUTS_JSON: ${{ toJson(inputs) }}
          IS_DRAFT_PR: ${{ github.event.pull_request.draft }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$IS_DRAFT_PR" == "true" ]]; then
            prefix="draft-pr-"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            prefix="pr-"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            prefix="main-"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            prefix="manual-trigger-"
          else
            prefix=""
          fi

          resolve() {
            local key="$1"
            local override
            override=$(echo "$INPUTS_JSON" | jq -r --arg k "${prefix}${key}" '.[$k] // ""')
            if [[ -n "$override" ]]; then
              echo "$override"
            else
              echo "$INPUTS_JSON" | jq -r --arg k "$key" '.[$k] | tostring'
            fi
          }

          echo "include-release-versions=$(resolve include-release-versions)" >> "$GITHUB_OUTPUT"
          echo "include-lts-versions=$(resolve include-lts-versions)" >> "$GITHUB_OUTPUT"
          echo "include-all-compatible-minor-versions=$(resolve include-all-compatible-minor-versions)" >> "$GITHUB_OUTPUT"
          echo "include-smallest-compatible-minor-versions=$(resolve include-smallest-compatible-minor-versions)" >> "$GITHUB_OUTPUT"
          echo "include-rc-versions=$(resolve include-rc-versions)" >> "$GITHUB_OUTPUT"
          echo "include-beta-versions=$(resolve include-beta-versions)" >> "$GITHUB_OUTPUT"
          echo "include-alpha-versions=$(resolve include-alpha-versions)" >> "$GITHUB_OUTPUT"
          echo "include-nightly-versions=$(resolve include-nightly-versions)" >> "$GITHUB_OUTPUT"
          echo "include-windows-x64=$(resolve include-windows-x64)" >> "$GITHUB_OUTPUT"
          echo "include-windows-x86=$(resolve include-windows-x86)" >> "$GITHUB_OUTPUT"
          echo "include-linux-x64=$(resolve include-linux-x64)" >> "$GITHUB_OUTPUT"
          echo "include-linux-x86=$(resolve include-linux-x86)" >> "$GITHUB_OUTPUT"
          echo "include-macos-x64=$(resolve include-macos-x64)" >> "$GITHUB_OUTPUT"
          echo "include-macos-aarch64=$(resolve include-macos-aarch64)" >> "$GITHUB_OUTPUT"
          echo "env=$(resolve env)" >> "$GITHUB_OUTPUT"
          echo "filter=$(resolve filter)" >> "$GITHUB_OUTPUT"
          echo "github_job_prep_script=$(resolve github_job_prep_script)" >> "$GITHUB_OUTPUT"
          echo "testitem-timeout=$(resolve testitem-timeout)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
      - uses: julia-actions/julia-compute-test-matrix@v1
        id: compute-test-matrix
        with:
          include-release-versions: ${{ steps.resolve.outputs.include-release-versions }}
          include-lts-versions: ${{ steps.resolve.outputs.include-lts-versions }}
          include-all-compatible-minor-versions: ${{ steps.resolve.outputs.include-all-compatible-minor-versions }}
          include-smallest-compatible-minor-versions: ${{ steps.resolve.outputs.include-smallest-compatible-minor-versions }}
          include-rc-versions: ${{ steps.resolve.outputs.include-rc-versions }}
          include-beta-versions: ${{ steps.resolve.outputs.include-beta-versions }}
          include-alpha-versions: ${{ steps.resolve.outputs.include-alpha-versions }}
          include-nightly-versions: ${{ steps.resolve.outputs.include-nightly-versions }}
          include-windows-x64: ${{ steps.resolve.outputs.include-windows-x64 }}
          include-windows-x86: ${{ steps.resolve.outputs.include-windows-x86 }}
          include-linux-x64: ${{ steps.resolve.outputs.include-linux-x64 }}
          include-linux-x86: ${{ steps.resolve.outputs.include-linux-x86 }}
          include-macos-x64: ${{ steps.resolve.outputs.include-macos-x64 }}
          include-macos-aarch64: ${{ steps.resolve.outputs.include-macos-aarch64 }}

  run-tests:
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.feature == 'LintAndTest') }}
    needs: compute-test-matrix
    strategy:
        fail-fast: false
        matrix:
          include: ${{ fromJson(needs.compute-test-matrix.outputs.test-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: julia-actions/install-juliaup@v2
      with:
        channel:  ${{ matrix.juliaup-channel }}
    - uses: julia-actions/julia-buildpkg@v1
    - name: Run worker prep script
      if: ${{ needs.compute-test-matrix.outputs.github_job_prep_script != '' }}
      run: julia ${{ needs.compute-test-matrix.outputs.github_job_prep_script }}
      shell: bash
    - name: Run tests
      uses: julia-actions/julia-run-testitems@main
      with:
        juliaup-channel: ${{ matrix.juliaup-channel }}
        profile-name: ${{ format('Julia {0}:{1}', matrix.juliaup-channel, matrix.os) }}
        results-path: ${{ format('testitemresults-{0}-{1}.json', matrix.os, matrix.juliaup-channel) }}
        env: ${{ needs.compute-test-matrix.outputs.env }}
        filter: ${{ needs.compute-test-matrix.outputs.filter }}
        testitem-timeout: ${{ needs.compute-test-matrix.outputs.testitem-timeout }}
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: ${{ format('testitemresults-{0}-{1}', matrix.os, matrix.juliaup-channel) }}
        path: ${{ format('testitemresults-{0}-{1}.json', matrix.os, matrix.juliaup-channel) }}
        retention-days: 1
    - uses: julia-actions/julia-processcoverage@v1
      if: ${{ !cancelled() }}
    - uses: codecov/codecov-action@v5
      if: ${{ !cancelled() }}
      with:
        files: ./lcov.info
        flags: unittests
        token: ${{ secrets.codecov_token }}

  report-results:
    needs: [run-tests, lint]
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.feature == 'LintAndTest') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: testitemresults-*
          path: testresults
          merge-multiple: true
      - uses: julia-actions/julia-report-ci-results@main
        with:
          results-path: testresults
          lint-results: ${{ needs.lint.outputs.lint-results }}
      - uses: geekyeggo/delete-artifact@v6
        with:
          name: testitemresults-*

  deploy-docs:
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.feature == 'DocDeploy') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check file existence
        id: check_files
        uses: andstor/file-existence-action@v3
        with:
          files: "docs/make.jl"
      - uses: julia-actions/cache@v2
        if: steps.check_files.outputs.files_exists == 'true'
      - uses: julia-actions/julia-buildpkg@v1
        if: steps.check_files.outputs.files_exists == 'true'
      - uses: julia-actions/julia-docdeploy@v1
        if: steps.check_files.outputs.files_exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tagbot:
    if: ${{ (github.event_name == 'issue_comment' && github.actor == 'JuliaTagBot') || (github.event_name == 'workflow_dispatch' && github.event.inputs.feature == 'TagBot') }}
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branches: true
          lookback: 30

  compat-helper:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.feature == 'CompatHelper') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check if Julia is already available in the PATH
        id: julia_in_path
        run: which julia
        continue-on-error: true
      - name: Install Julia, but only if it is not already available in the PATH
        uses: julia-actions/setup-julia@v1
        with:
          version: '1'
          arch: ${{ runner.arch }}
        if: steps.julia_in_path.outcome != 'success'
      - name: "Add the General registry via Git"
        run: |
          import Pkg
          ENV["JULIA_PKG_SERVER"] = ""
          Pkg.Registry.add("General")
        shell: julia --color=yes {0}
      - name: "Install CompatHelper"
        run: |
          import Pkg
          name = "CompatHelper"
          uuid = "aa819f21-2bde-4658-8897-bab36330d9b7"
          version = "3"
          Pkg.add(; name, uuid, version)
        shell: julia --color=yes {0}
      - name: "Run CompatHelper"
        run: |
          import CompatHelper
          CompatHelper.main()
        shell: julia --color=yes {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPATHELPER_PRIV: ${{ secrets.DOCUMENTER_KEY }}
          # COMPATHELPER_PRIV: ${{ secrets.COMPATHELPER_PRIV }}
